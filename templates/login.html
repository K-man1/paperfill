<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Paperfill — Sign In</title>
{% if adsense_client %}<!-- Google AdSense site loader (needed for account verification) -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ adsense_client }}" crossorigin="anonymous"></script>{% endif %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f5f1e8;
  --paper-deep: #ebe5d4;
  --ink: #1a1814;
  --ink-soft: #4a4438;
  --rule: #c9c0a8;
  --rule-soft: #ddd5bf;
  --accent: #ff5a1f;
  --accent-deep: #c93f10;
  --serif: "Fraunces", "Times New Roman", serif;
  --sans: "IBM Plex Sans", system-ui, sans-serif;
  --mono: "IBM Plex Mono", ui-monospace, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 16px;
  padding: 48px 40px 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 2px 0 rgba(0,0,0,0.04), 0 24px 48px -16px rgba(26,24,20,0.18);
  text-align: center;
}
.logo {
  font-family: var(--serif);
  font-size: 2rem;
  font-weight: 800;
  color: var(--ink);
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}
.logo span { color: var(--accent); }
.subtitle {
  font-size: 0.875rem;
  color: var(--ink-soft);
  margin-bottom: 36px;
}
label {
  display: block;
  text-align: left;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--ink-soft);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
input[type="password"] {
  width: 100%;
  padding: 12px 16px;
  font-family: var(--mono);
  font-size: 1rem;
  border: 1.5px solid var(--rule);
  border-radius: 8px;
  background: var(--paper);
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
  letter-spacing: 0.1em;
}
input[type="password"]:focus { border-color: var(--accent); }
.error {
  margin-top: 12px;
  padding: 10px 14px;
  background: #fff0eb;
  border: 1px solid #ffcbb8;
  border-radius: 8px;
  color: var(--accent-deep);
  font-size: 0.85rem;
  text-align: left;
}
button {
  margin-top: 20px;
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: #fff;
  font-family: var(--sans);
  font-size: 0.95rem;
  font-weight: 500;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: var(--accent-deep); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Paper<span>fill</span></div>
  <div class="subtitle">Enter your access code to continue</div>
  <form method="post" action="/login">
    <label for="password">Access Code</label>
    <input type="password" id="password" name="password" autofocus autocomplete="current-password" placeholder="••••••" />
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
